<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Finance Tracker | Mehak</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .hidden { display: none; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">
    <div class="max-w-6xl mx-auto p-4 md:p-8">
        
        <div id="authSection" class="bg-white p-10 rounded-2xl shadow-2xl max-w-md mx-auto mt-20 border border-slate-100">
            <div class="text-center mb-8">
                <h2 id="authTitle" class="text-3xl font-black text-indigo-600">Welcome Back</h2>
                <p class="text-slate-500 mt-2">Manage your finances smarter</p>
            </div>
            <div class="space-y-4">
                <input id="email" type="email" placeholder="Email Address" class="w-full border border-slate-200 p-4 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                <input id="password" type="password" placeholder="Password" class="w-full border border-slate-200 p-4 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                <button onclick="handleAuth()" id="authBtn" class="w-full bg-indigo-600 text-white p-4 rounded-xl hover:bg-indigo-700 font-bold shadow-lg shadow-indigo-200 transition-all transform active:scale-95">Login</button>
                <p class="text-center text-sm text-slate-600 mt-6">
                    <span id="toggleText">Don't have an account?</span> 
                    <button onclick="toggleAuth()" class="text-indigo-600 font-bold hover:underline ml-1">Click here</button>
                </p>
            </div>
        </div>

        <div id="dashboardSection" class="hidden">
            <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                <div>
                    <h1 class="text-4xl font-black text-slate-800 tracking-tight text-center md:text-left">Financial Overview</h1>
                    <p class="text-slate-500 text-center md:text-left">Keep your budget in check, Mehak.</p>
                </div>
                <button onclick="logout()" class="bg-white border border-red-100 text-red-500 px-6 py-2 rounded-full font-bold hover:bg-red-50 transition shadow-sm">Logout</button>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 space-y-8">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 border-l-4 border-l-emerald-500">
                            <h3 class="text-slate-400 text-xs font-bold uppercase">Income</h3>
                            <p id="totalIncome" class="text-2xl font-black text-slate-800">₹0</p>
                        </div>
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 border-l-4 border-l-rose-500">
                            <h3 class="text-slate-400 text-xs font-bold uppercase">Expense</h3>
                            <p id="totalExpense" class="text-2xl font-black text-slate-800">₹0</p>
                        </div>
                        <div class="bg-indigo-600 p-6 rounded-2xl shadow-lg text-white">
                            <h3 class="opacity-70 text-xs font-bold uppercase">Balance</h3>
                            <p id="balance" class="text-2xl font-black">₹0</p>
                        </div>
                    </div>

                    <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
                        <h2 id="formTitle" class="text-xl font-bold mb-6 text-slate-800">Add Transaction</h2>
                        <input type="hidden" id="editId" value="">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <input id="amount" type="number" placeholder="Amount (₹)" class="border border-slate-200 p-3 rounded-xl outline-none focus:border-indigo-500">
                            <input id="category" type="text" placeholder="Category" class="border border-slate-200 p-3 rounded-xl outline-none focus:border-indigo-500">
                            <select id="type" class="border border-slate-200 p-3 rounded-xl outline-none focus:border-indigo-500">
                                <option value="income">Income (+)</option>
                                <option value="expense">Expense (-)</option>
                            </select>
                            <div class="flex gap-2">
                                <button onclick="saveRecord()" id="saveBtn" class="flex-1 bg-indigo-600 text-white p-3 rounded-xl font-bold hover:bg-indigo-700 transition">Save Entry</button>
                                <button id="cancelBtn" onclick="resetForm()" class="hidden bg-slate-200 text-slate-600 p-3 rounded-xl font-bold hover:bg-slate-300 transition">Cancel</button>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 text-slate-400 text-xs uppercase font-bold">
                                <tr>
                                    <th class="px-6 py-4">Category</th>
                                    <th class="px-6 py-4">Type</th>
                                    <th class="px-6 py-4 text-right">Amount</th>
                                    <th class="px-6 py-4 text-center">Action</th>
                                </tr>
                            </thead>
                            <tbody id="recordTableBody" class="divide-y divide-slate-50"></tbody>
                        </table>
                    </div>
                </div>

                <div class="space-y-8">
                    <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 h-fit">
                        <h2 class="text-xl font-bold mb-6 text-center">Analytics</h2>
                        <div class="h-64"><canvas id="financeChart"></canvas></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isLoginMode = true;
        let currentUserId = localStorage.getItem('user_id');
        let myChart = null;

        // AUTH & UI LOGIC
        function toggleAuth() {
            isLoginMode = !isLoginMode;
            document.getElementById('authTitle').innerText = isLoginMode ? 'Welcome Back' : 'Create Account';
            document.getElementById('authBtn').innerText = isLoginMode ? 'Login' : 'Sign Up';
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                if (isLoginMode) {
                    const params = new URLSearchParams();
                    params.append('username', email);
                    params.append('password', password);
                    const res = await fetch('/auth/login', { method: 'POST', body: params });
                    const data = await res.json();
                    if (res.ok) { localStorage.setItem('user_id', data.user_id); currentUserId = data.user_id; showDashboard(); }
                    else { alert(data.detail); }
                } else {
                    const res = await fetch('/auth/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password, role: "user" }) });
                    if (res.ok) { alert("Done! Login now."); toggleAuth(); }
                }
            } catch (e) { alert("Server error"); }
        }

        function showDashboard() {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('dashboardSection').classList.remove('hidden');
            updateUI();
        }

        function logout() { localStorage.clear(); location.reload(); }

        // CORE CRUD LOGIC
        async function updateUI() { fetchSummary(); fetchRecords(); }

        async function fetchSummary() {
            const res = await fetch(`/records/user/${currentUserId}/summary`);
            if (res.ok) {
                const data = await res.json();
                document.getElementById('totalIncome').innerText = `₹${data.total_income}`;
                document.getElementById('totalExpense').innerText = `₹${data.total_expense}`;
                document.getElementById('balance').innerText = `₹${data.balance}`;
                updateChart(data.total_income, data.total_expense);
            }
        }

        async function fetchRecords() {
            const res = await fetch(`/records/user/${currentUserId}`);
            if (res.ok) {
                const records = await res.json();
                const tableBody = document.getElementById('recordTableBody');
                tableBody.innerHTML = '';
                records.reverse().forEach(r => {
                    tableBody.innerHTML += `
                        <tr class="hover:bg-slate-50 transition-colors">
                            <td class="px-6 py-4 font-semibold text-slate-700">${r.category}</td>
                            <td class="px-6 py-4"><span class="px-2 py-1 rounded text-[10px] font-bold uppercase ${r.type === 'income' ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}">${r.type}</span></td>
                            <td class="px-6 py-4 text-right font-bold ${r.type === 'income' ? 'text-emerald-600' : 'text-rose-600'}">₹${r.amount}</td>
                            <td class="px-6 py-4 text-center flex justify-center gap-3">
                                <button onclick="editRecord(${r.id}, '${r.category}', ${r.amount}, '${r.type}')" class="text-indigo-400 hover:text-indigo-600">Edit</button>
                                <button onclick="deleteRecord(${r.id})" class="text-rose-300 hover:text-rose-600">Del</button>
                            </td>
                        </tr>`;
                });
            }
        }

        async function saveRecord() {
            const id = document.getElementById('editId').value;
            const amount = document.getElementById('amount').value;
            const category = document.getElementById('category').value;
            const type = document.getElementById('type').value;

            if (!amount || !category) return alert("Fill all fields");

            const url = id ? `/records/${id}` : `/records/?user_id=${currentUserId}`;
            const method = id ? 'PUT' : 'POST';

            const res = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ amount: parseFloat(amount), type, category, notes: "" })
            });

            if (res.ok) { resetForm(); updateUI(); }
        }

        function editRecord(id, cat, amt, type) {
            document.getElementById('editId').value = id;
            document.getElementById('amount').value = amt;
            document.getElementById('category').value = cat;
            document.getElementById('type').value = type;
            document.getElementById('formTitle').innerText = "Update Transaction";
            document.getElementById('saveBtn').innerText = "Update";
            document.getElementById('cancelBtn').classList.remove('hidden');
        }

        function resetForm() {
            document.getElementById('editId').value = "";
            document.getElementById('amount').value = "";
            document.getElementById('category').value = "";
            document.getElementById('formTitle').innerText = "Add Transaction";
            document.getElementById('saveBtn').innerText = "Save Entry";
            document.getElementById('cancelBtn').classList.add('hidden');
        }

        async function deleteRecord(id) {
            if (confirm("Delete?")) { await fetch(`/records/${id}`, { method: 'DELETE' }); updateUI(); }
        }

        function updateChart(i, e) {
            const ctx = document.getElementById('financeChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: ['Income', 'Expense'], datasets: [{ data: [i, e], backgroundColor: ['#10b981', '#f43f5e'], borderWidth: 0 }] },
                options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } }, cutout: '75%' }
            });
        }

        if (currentUserId) showDashboard();
    </script>
</body>
</html>
